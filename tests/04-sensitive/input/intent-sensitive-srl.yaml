apiVersion: config.sdcio.dev/v1alpha1
kind: Config
metadata:
  name: intent-sensitive-srl
  namespace: default
  labels:
    config.sdcio.dev/targetName: srl1
    config.sdcio.dev/targetNamespace: default
spec:
  priority: 10
  vars:
  - name: desc
    secretRef:
      name: sensitive-payload
      key: description
  config:
  - path: /
    value:
      interface:
      - name: ethernet-1/6
        admin-state: "enable"
        description: "${vars.desc}"
