apiVersion: inv.sdcio.dev/v1alpha1
kind: DiscoveryRule
metadata:
  name: dr-sros-gnmi-sr2-onchange
  namespace: default
spec:
  period: 1m
  concurrentScans: 2
  addresses:
  - address: 172.21.1.12
    hostName: sr2
  discoveryProfile:
    credentials: sros.nokia.sdcio.dev
    connectionProfiles:
    - test-sros-gnmi
  targetConnectionProfiles:
  - credentials: sros.nokia.sdcio.dev
    connectionProfile: test-sros-gnmi
    syncProfile: test-sros-gnmi-onchange-json
  targetTemplate:
    labels:
      sdcio.dev/region: eu-west
      scdio.dev/env: ci-test
      sdcio.dev/device: sros