name: Reusable specific-release integration-tests

on: 
  workflow_call:
    inputs:
      schemaserver_version:
        description: "schema-server semver release (vX.Y.Z)"
        required: true
        type: string
      dataserver_version:
        description: "data-server semver release (vX.Y.Z)"
        required: true
        type: string
      cache_version:
        description: "cache semver release (vX.Y.Z)"
        required: true
        type: string
      configserver_version:
        description: "config-server image tag = git ref: SemVer tag (vX.Y.Z), **main** (default branch + :main images; also accepts refs/heads/main), or 40-char commit."
        required: true
        type: string
      certmanager_version:
        description: "cert-manager release (vX.Y.Z)"
        required: true
        type: string
      integration_tests_ref:
        description: >
          Branch, tag, or SHA of sdcio/integration-tests to check out for test execution.
          Defaults to main. Set via Pairs-with: sdcio/integration-tests#NNN in PR body
          to test feature-branch Robot suites alongside paired data-server/config-server changes.
        required: false
        default: "main"
        type: string
env:
  PY_VER: "3.10"
  GO_VER: "1.25.8"
  SDC_NAMESPACE: sdc-system

jobs:
  setup-clab-cluster-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Set env vars
        run: |
          cfg="${{ inputs.configserver_version }}"
          case "${cfg,,}" in
            main|refs/heads/main|origin/main) cfg=main ;;
          esac
          echo "SCHEMA_VERSION=${{ inputs.schemaserver_version }}" >> $GITHUB_ENV
          echo "DATA_VERSION=${{ inputs.dataserver_version }}" >> $GITHUB_ENV
          echo "CACHE_VERSION=${{ inputs.cache_version }}" >> $GITHUB_ENV
          echo "CONFIG_VERSION=${cfg}" >> $GITHUB_ENV
          echo "CERT_MANAGER_VERSION=${{ inputs.certmanager_version }}" >> $GITHUB_ENV

      - name: Checkout integration-tests
        uses: actions/checkout@v7
        with:
          repository: sdcio/integration-tests
          ref: ${{ inputs.integration_tests_ref }}
          path: integration-tests

      - name: Checkout config-server
        uses: actions/checkout@v7
        with:
          path: config-server
          ref: ${{ env.CONFIG_VERSION }}
          fetch-depth: 0
          repository: sdcio/config-server
          token: ${{ secrets.GITHUB_TOKEN }} # `GH_PAT` is a secret that contains your PAT

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VER }}
          cache: pip
          cache-dependency-path: "integration-tests/tests/requirements.txt"

      - name: Install robotframework
        run: |
          pip install -r integration-tests/tests/requirements.txt

      - name: Install gNMIc
        run: |
          bash -c "$(curl -sL https://get-gnmic.openconfig.net)"
      
      - name: Install containerlab
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/netdevops/ /" | sudo tee -a /etc/apt/sources.list.d/netdevops.list
          sudo apt update && sudo apt install -y containerlab iptables
          sudo iptables -I DOCKER-USER 1 -j ACCEPT

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VER }}

      - name: Install kubectl-sdc plugin from main
        run: |
          GOPROXY=direct go install github.com/sdcio/kubectl-sdc/cmd/kubectl-sdc@main

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SROS License
        env:
          SROS_LICENSE: ${{ secrets.SROS25_LICENSE }}
        run: |
          echo $SROS_LICENSE | tee ./integration-tests/containerlab/license-sros.txt

      - name: Deploy CI-Test-Containerlab
        env:
          CLAB_LABDIR_BASE: "/home/runner/_work/_clab"
        run: |
          sudo -E containerlab deploy -t ./integration-tests/containerlab/citest.clab.yml --reconfigure

      - name: Set the versions to test
        run: |
          cat ./integration-tests/artifacts/kform/configmap-input-vars.yaml.tmpl | envsubst > ./config-server/artifacts/in/configmap-input-vars.yaml
          cd ./config-server
          make artifacts
          yq -i 'select(.kind == "StatefulSet" and .metadata.name == "data-server-controller") |= (with(.spec.template.spec.containers[] | select(.name == "data-server"); .env = ((.env // []) | map(select(.name != "DEVIATION_INTERVAL"))) + [{"name":"DEVIATION_INTERVAL","value":"10s"}]))' ./artifacts/out/artifacts.yaml
          # adjust trace level of data-server
          yq -i 'select(.kind == "StatefulSet" and .metadata.name == "data-server-controller") .spec.template.spec.containers[] |= select(.name == "data-server") .args = (.args // []) + ["-t"]' ./artifacts/out/artifacts.yaml
          cd -

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: ci-kind
          version: v0.30.0
          kubectl_version: v1.34.7
          ignore_failed_clean: true
          #config: ./integration-tests/k8s/kind-config.yml

      - name: Make sure the default context is set
        run: |
          #./integration-tests/k8s/patch-kind-registry.sh ci-kind
          kubectl config set-context --current --namespace=default

      - name: Run Robot Tests 00 - Setup SDCIO
        run: |
          robot --consolecolors on -r none -l ./integration-tests/tests/out/00-setup-log --output ./integration-tests/tests/out/00-setup-out.xml ./integration-tests/tests/00-setup/

      - name: Run Robot Tests 01 - Load Schema, Apply Connection Profiles, Acquire Targets
        run: |
          robot --consolecolors on -r none -l ./integration-tests/tests/out/01-crs-log --output ./integration-tests/tests/out/01-crs-out.xml ./integration-tests/tests/01-crs/

      - name: Start collecting logs for 02-CRUD
        run: |
          mkdir -p ./integration-tests/tests/out/02-crud-logs
          
          # Start data-server log collection
          kubectl logs -f statefulset/data-server-controller -c data-server -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/02-crud-logs/data-server.log 2>&1 &
          echo $! > /tmp/data-server-pid.txt
          
          # Start data-server-controller log collection
          kubectl logs -f statefulset/data-server-controller -c controller -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/02-crud-logs/data-server-controller.log 2>&1 &
          echo $! > /tmp/data-server-controller-pid.txt

          # Start api-server log collection
          kubectl logs -f deployment/api-server -c api-server -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/02-crud-logs/api-server.log 2>&1 &
          echo $! > /tmp/api-server-pid.txt

      - name: Run Robot Tests 02 - CRUD testing
        run: |
          robot --consolecolors on -r none -l ./integration-tests/tests/out/02-crud-log --output ./integration-tests/tests/out/02-crud-out.xml ./integration-tests/tests/02-crud/

      - name: Stop collecting logs for 02-CRUD
        if: always()
        run: |
          # Kill processes using the standard PID files
          [ -f /tmp/data-server-pid.txt ] && kill $(cat /tmp/data-server-pid.txt) 2>/dev/null || true
          [ -f /tmp/data-server-controller-pid.txt ] && kill $(cat /tmp/data-server-controller-pid.txt) 2>/dev/null || true
          [ -f /tmp/api-server-pid.txt ] && kill $(cat /tmp/api-server-pid.txt) 2>/dev/null || true
          sleep 1

      - name: Start collecting logs for 03-Deviations
        run: |
          mkdir -p ./integration-tests/tests/out/03-deviations-logs
          
          # Collect data-server logs
          kubectl logs -f statefulset/data-server-controller -c data-server -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/03-deviations-logs/data-server.log 2>&1 &
          echo $! > /tmp/data-server-pid.txt
          
          # Collect data-server-controller logs
          kubectl logs -f statefulset/data-server-controller -c controller -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/03-deviations-logs/data-server-controller.log 2>&1 &
          echo $! > /tmp/data-server-controller-pid.txt

          # Collect api-server logs
          kubectl logs -f deployment/api-server -c api-server -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s > ./integration-tests/tests/out/03-deviations-logs/api-server.log 2>&1 &
          echo $! > /tmp/api-server-pid.txt

      - name: Run Robot Tests 03 - Deviations testing
        run: |
          robot --consolecolors on -r none -l ./integration-tests/tests/out/03-deviations-log --output ./integration-tests/tests/out/03-deviations-out.xml ./integration-tests/tests/03-deviations/

      - name: Stop collecting logs for 03-Deviations
        if: always()
        run: |
          # Kill processes using the standard PID files
          [ -f /tmp/data-server-pid.txt ] && kill $(cat /tmp/data-server-pid.txt) 2>/dev/null || true
          [ -f /tmp/data-server-controller-pid.txt ] && kill $(cat /tmp/data-server-controller-pid.txt) 2>/dev/null || true
          [ -f /tmp/api-server-pid.txt ] && kill $(cat /tmp/api-server-pid.txt) 2>/dev/null || true
          sleep 1

      # Runs any numbered suites beyond 03 that are present in the checked-out integration-tests
      # branch (e.g. 04-sensitive, 05-foo). Suites 00-03 above are handled by explicit steps.
      # This step is a no-op when no additional suites exist, so merging it to main once is enough
      # — feature branches that add new suites are picked up automatically via integration_tests_ref.
      - name: Run Robot Tests 04+ - Additional suites (auto-discovered)
        run: |
          shopt -s nullglob
          additional=( ./integration-tests/tests/0[4-9]-* ./integration-tests/tests/[1-9][0-9]-* )
          if [ ${#additional[@]} -eq 0 ]; then
            echo "No additional test suites found (04+), skipping."
            exit 0
          fi
          for dir in "${additional[@]}"; do
            [ -d "$dir" ] || continue
            suite=$(basename "$dir")
            echo "=== Running suite: ${suite} ==="
            mkdir -p "./integration-tests/tests/out/${suite}-logs"

            kubectl logs -f statefulset/data-server-controller -c data-server \
              -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s \
              > "./integration-tests/tests/out/${suite}-logs/data-server.log" 2>&1 &
            echo $! > /tmp/extra-ds-pid.txt

            kubectl logs -f statefulset/data-server-controller -c controller \
              -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s \
              > "./integration-tests/tests/out/${suite}-logs/data-server-controller.log" 2>&1 &
            echo $! > /tmp/extra-dsc-pid.txt

            kubectl logs -f deployment/api-server -c api-server \
              -n ${{ env.SDC_NAMESPACE }} --tail=0 --since=0s \
              > "./integration-tests/tests/out/${suite}-logs/api-server.log" 2>&1 &
            echo $! > /tmp/extra-api-pid.txt

            robot --consolecolors on -r none \
              -l  "./integration-tests/tests/out/${suite}-log" \
              --output "./integration-tests/tests/out/${suite}-out.xml" \
              "$dir"
            ROBOT_RC=$?

            [ -f /tmp/extra-ds-pid.txt ]  && kill "$(cat /tmp/extra-ds-pid.txt)"  2>/dev/null || true
            [ -f /tmp/extra-dsc-pid.txt ] && kill "$(cat /tmp/extra-dsc-pid.txt)" 2>/dev/null || true
            [ -f /tmp/extra-api-pid.txt ] && kill "$(cat /tmp/extra-api-pid.txt)" 2>/dev/null || true
            sleep 1

            [ $ROBOT_RC -ne 0 ] && exit $ROBOT_RC
          done

      # upload test reports as a zip file
      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: single-robot-tests-log-config-server_${{ env.CONFIG_VERSION }}-data-server_${{ env.DATA_VERSION }}
          path: |
            ./integration-tests/tests/out/*
